name: Setup Kanban

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  setup:
    # Auto-run only on first push (repo created from template); always run on workflow_dispatch
    if: github.event_name == 'workflow_dispatch' || github.run_number == 1
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Criar labels do kanban
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "backlog"      --color "ededed" --description "Ideias e tarefas futuras"  --repo ${{ github.repository }} --force
          gh label create "todo"         --color "0075ca" --description "Proximas a fazer"          --repo ${{ github.repository }} --force
          gh label create "in-progress"  --color "e4e669" --description "Em andamento"              --repo ${{ github.repository }} --force
          gh label create "review"       --color "d93f0b" --description "Aguardando revisao"        --repo ${{ github.repository }} --force
          gh label create "done"         --color "0e8a16" --description "Concluido"                 --repo ${{ github.repository }} --force

      - name: Criar GitHub Project board
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          OWNER_ID=$(gh api graphql -f query='query { viewer { id } }' --jq '.data.viewer.id')
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PROJECT_TITLE="${REPO_NAME} Kanban"

          EXISTING_PROJECT=$(gh api graphql -f query="
            query {
              viewer {
                projectsV2(first: 100, orderBy: {field: TITLE, direction: ASC}) {
                  nodes {
                    id
                    title
                    url
                  }
                }
              }
            }
          " --jq ".data.viewer.projectsV2.nodes[] | select(.title == \"$PROJECT_TITLE\")" || true)

          if [ -n "$EXISTING_PROJECT" ]; then
            PROJECT_ID=$(echo "$EXISTING_PROJECT" | jq -r '.id')
            PROJECT_URL=$(echo "$EXISTING_PROJECT" | jq -r '.url')
            echo "Project existente encontrado: $PROJECT_URL"
          else
            PROJECT_DATA=$(gh api graphql -f query="
              mutation {
                createProjectV2(input: {ownerId: \"$OWNER_ID\", title: \"$PROJECT_TITLE\"}) {
                  projectV2 { id url }
                }
              }
            ")

            PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.id')
            PROJECT_URL=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.url')
            echo "Project criado: $PROJECT_URL"
          fi

          STATUS_FIELD=$(gh api graphql -f query="
            query {
              node(id: \"$PROJECT_ID\") {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          name
                          color
                          description
                        }
                      }
                    }
                  }
                }
              }
            }
          " --jq '.data.node.fields.nodes[] | select(.name == "Status")' || true)

          STATUS_FIELD_ID=$(echo "$STATUS_FIELD" | jq -r '.id // empty')

          if [ -z "$STATUS_FIELD_ID" ]; then
            echo "Campo Status nao encontrado."
            exit 1
          fi

          UPDATED_OPTIONS_JSON=$(echo "$STATUS_FIELD" | jq -c '
            .options as $options
            | $options
            + (if any($options[]?; .name == "Backlog") then [] else [{
                name: "Backlog",
                color: "GRAY",
                description: "Ideias e tarefas futuras"
              }] end)
            + (if any($options[]?; .name == "Review") then [] else [{
                name: "Review",
                color: "RED",
                description: "Aguardando revisao"
              }] end)
          ')

          NEEDS_STATUS_UPDATE=$(echo "$STATUS_FIELD" | jq -r '
            [ .options[]?.name ] as $names
            | if ($names | index("Backlog")) == null or ($names | index("Review")) == null
              then "true"
              else "false"
              end
          ')

          if [ "$NEEDS_STATUS_UPDATE" = "true" ]; then
            UPDATED_OPTIONS_GRAPHQL=$(echo "$UPDATED_OPTIONS_JSON" | jq -r '
              map(
                "{name: \"" + .name
                + "\", color: " + .color
                + ", description: \"" + (.description | gsub("\\\\"; "\\\\\\\\") | gsub("\""; "\\\\\""))
                + "\"}"
              ) | join(", ")
            ')

            gh api graphql -f query="
              mutation {
                updateProjectV2Field(input: {
                  fieldId: \"$STATUS_FIELD_ID\",
                  singleSelectOptions: [ $UPDATED_OPTIONS_GRAPHQL ]
                }) {
                  projectV2Field {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                    }
                  }
                }
              }
            "
          else
            echo "Campo Status ja contem Backlog e Review; pulando atualizacao."
          fi

      - name: Criar issue de Getting Started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Getting Started" \
            --label "todo" \
            --body "## Setup inicial

          - [ ] Renomear \`project-name\` em \`pyproject.toml\`
          - [ ] Criar \`.mcp.json\` a partir de \`.mcp.json.example\` (nao commitar)
          - [ ] Criar \`CLAUDE.local.md\` a partir de \`CLAUDE.local.md.example\` (nao commitar)
          - [ ] Rodar \`uv sync\` para instalar dependencias
          - [ ] Abrir o projeto no Claude Code: \`claude\`

          > Este issue foi criado automaticamente pelo workflow Setup Kanban."
