name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Instalar dependências
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Formato (black)
        run: uv run black --check .

      - name: Testes (pytest)
        run: uv run pytest
